<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - FileBridge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
  <style>
    .login-body {
      background: var(--fb-bg);
      background-image: 
        radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .login-shell {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }
    .login-panel {
      background: var(--fb-panel);
      backdrop-filter: blur(12px);
      border: 1px solid var(--fb-border);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      padding: 32px;
    }
  </style>
</head>
<body class="login-body">
  <div class="login-shell">
    <div class="text-center mb-4">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="FileBridge Logo" class="brand-logo-large">
      <p class="text-secondary small mt-n2">Infrastructure Control Plane</p>
    </div>

    <div class="login-panel rounded-4">
      <h1 class="h4 fw-bold text-white mb-4">Sign In</h1>
      
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category if category != 'danger' else 'danger status-failed' }} py-2 x-small border-0 mb-4">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form action="{{ url_for('login') }}" method="POST">
        <div class="mb-3">
          <label class="form-label text-secondary small fw-bold">USERNAME</label>
          <input type="text" name="username" class="form-control px-3 py-2 rounded-0" placeholder="admin" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label text-secondary small fw-bold">PASSWORD</label>
          <input type="password" name="password" class="form-control px-3 py-2 rounded-0" placeholder="••••••••" required>
        </div>
        <div class="d-grid mb-3">
          <button type="submit" class="btn btn-primary py-2 fw-bold rounded-0">SIGN INTO PLATFORM</button>
        </div>
        <div class="text-center">
          <a href="#" class="text-secondary x-small text-decoration-none hover-white">Forgot password? Contact Administrator</a>
        </div>
      </form>
    </div>
    
    <div class="mt-4 text-center">
      <p class="text-secondary x-small">© 2026 FileBridge Infrastructure. v1.2.0-stable</p>
    </div>
  </div>

  <style>
    .x-small { font-size: 11px; }
    .hover-white:hover { color: #fff !important; }
    .tracking-tight { letter-spacing: -0.02em; }
  </style>
</body>
</html>
