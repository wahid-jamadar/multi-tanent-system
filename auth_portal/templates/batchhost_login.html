<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BatchHost-Pro — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/images/BatchHost-Pro_logo.png">
  <style>
    :root {
      --bg: #0B1220; --bg2: #111827; --bg3: #1A2332; --border: #1F2A3A;
      --text: #E5E7EB; --text2: #9CA3AF; --text3: #6B7280;
      --accent: #3B82F6; --accent2: #2563EB;
      --green: #22C55E; --red: #EF4444;
      --purple: #8B5CF6;
      --mono: 'JetBrains Mono', monospace; --sans: 'Inter', 'IBM Plex Sans', 'Segoe UI', sans-serif;
    }
    [data-theme="light"] {
      --bg: #F6F8FB; --bg2: #ffffff; --bg3: #F1F5F9; --border: #D8E0EA;
      --text: #111827; --text2: #4B5563; --text3: #6B7280;
    }
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: var(--sans);
      background: var(--bg) url('/images/login-page-bg-image.png') no-repeat center center fixed;
      background-size: cover;
      color: var(--text);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .bg-grid {
      position: fixed; inset:0; pointer-events:none; opacity:0.04;
      background-image: linear-gradient(var(--border) 1px, transparent 1px),
                        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .glow {
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: transparent;
      top: -100px; left: -100px;
      pointer-events: none;
    }
    .card {
      background: var(--bg2);
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 40px 36px;
      width: 420px;
      max-width: 95vw;
      position: relative;
      z-index: 1;
      box-shadow: 0 18px 48px rgba(0,0,0,0.32);
      animation: cardIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes cardIn { from { transform: translateY(20px) scale(0.97); opacity:0; } }
    .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .logo-icon {
      width: 40px; height: 40px;
      background: rgba(59,130,246,0.12);
      border: 1px solid rgba(59,130,246,0.28);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center; font-size: 20px;
    }
    .logo-text { font-size: 22px; font-weight: 700; }
    .logo-text span { color: var(--text2); }
    h2 { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
    .sub { font-size: 14px; color: var(--text2); margin-bottom: 26px; }
    .form-row { margin-bottom: 16px; }
    label { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.04em; }
    input {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 11px 14px;
      font-size: 14px; font-family: var(--sans); outline: none;
      transition: all 0.2s ease;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.14); }
    .btn {
      width: 100%; padding: 12px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; font-family: var(--sans);
      cursor: pointer; transition: all 0.2s ease;
      margin-top: 4px;
    }
    .btn:hover { background: var(--accent2); transform: translateY(-1px); }
    .btn:active { transform: none; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .switch-link { text-align: center; margin-top: 18px; font-size: 13px; color: var(--text2); }
    .switch-link a { color: var(--accent); text-decoration: none; font-weight: 700; }
    .flash {
      position: fixed; top: 20px; right: 20px; z-index: 9999;
      display: flex; flex-direction: column; gap: 8px;
    }
    .flash-msg {
      padding: 12px 18px; border-radius: 8px; font-size: 13px; font-weight: 600;
      display: flex; align-items: center; gap: 8px;
      animation: slideIn 0.25s ease, fadeOut 0.3s ease 2.7s forwards;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .flash-msg.success { background: rgba(34,197,94,0.10); color: var(--green); border: 1px solid rgba(34,197,94,0.26); }
    .flash-msg.error   { background: rgba(239,68,68,0.11); color: var(--red); border: 1px solid rgba(239,68,68,0.28); }
    @keyframes slideIn { from { transform: translateX(60px); opacity:0; } }
    @keyframes fadeOut { to { opacity:0; transform: translateX(60px); } }

    /* ═══════════════════════════════════════════════════════════════
       SPLASH SCREEN
       Always dark mode, centered, full viewport overlay
       ═══════════════════════════════════════════════════════════════ */
    .splash-overlay {
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: #0B1220;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .splash-overlay.fade-out {
      opacity: 0;
      transform: scale(1.03);
      pointer-events: none;
    }

    /* Subtle grid background */
    .splash-grid {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.035;
      background-image:
        linear-gradient(#1F2A3A 1px, transparent 1px),
        linear-gradient(90deg, #1F2A3A 1px, transparent 1px);
      background-size: 40px 40px;
      animation: splashGridDrift 20s linear infinite;
    }

    @keyframes splashGridDrift {
      to { background-position: 40px 40px; }
    }

    /* Glow behind logo */
    .splash-glow {
      position: absolute;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.18) 0%, rgba(139, 92, 246, 0.06) 50%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      pointer-events: none;
      animation: splashGlowPulse 2.5s ease-in-out infinite;
    }

    @keyframes splashGlowPulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -60%) scale(1); }
      50%      { opacity: 1;   transform: translate(-50%, -60%) scale(1.08); }
    }

    /* Floating particles */
    .splash-particles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .splash-particle {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(59, 130, 246, 0.35);
      animation: splashParticleFloat linear infinite;
    }

    .splash-particle:nth-child(1) { left: 15%; top: 80%; animation-duration: 4s; animation-delay: 0s; width: 2px; height: 2px; }
    .splash-particle:nth-child(2) { left: 30%; top: 90%; animation-duration: 5s; animation-delay: 0.3s; }
    .splash-particle:nth-child(3) { left: 50%; top: 85%; animation-duration: 3.5s; animation-delay: 0.6s; width: 4px; height: 4px; background: rgba(139, 92, 246, 0.3); }
    .splash-particle:nth-child(4) { left: 70%; top: 88%; animation-duration: 4.5s; animation-delay: 0.2s; width: 2px; height: 2px; }
    .splash-particle:nth-child(5) { left: 85%; top: 82%; animation-duration: 5.5s; animation-delay: 0.8s; background: rgba(139, 92, 246, 0.25); }
    .splash-particle:nth-child(6) { left: 25%; top: 75%; animation-duration: 6s; animation-delay: 1s; width: 2px; height: 2px; }
    .splash-particle:nth-child(7) { left: 60%; top: 92%; animation-duration: 3.8s; animation-delay: 0.5s; width: 4px; height: 4px; background: rgba(59, 130, 246, 0.2); }
    .splash-particle:nth-child(8) { left: 42%; top: 78%; animation-duration: 4.2s; animation-delay: 1.2s; }

    @keyframes splashParticleFloat {
      from { transform: translateY(0) scale(1); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      to   { transform: translateY(-100vh) scale(0.3); opacity: 0; }
    }

    /* Content container */
    .splash-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Logo */
    .splash-logo {
      height: 120px;
      width: auto;
      opacity: 0;
      transform: scale(0.82);
      animation: splashLogoIn 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      filter: drop-shadow(0 0 40px rgba(59, 130, 246, 0.25))
              drop-shadow(0 8px 32px rgba(0, 0, 0, 0.4));
      margin-bottom: 20px;
    }

    @keyframes splashLogoIn {
      0%   { opacity: 0; transform: scale(0.82) translateY(10px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Brand name */
    .splash-brand {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      font-size: 34px;
      font-weight: 800;
      color: #E5E7EB;
      letter-spacing: -0.02em;
      opacity: 0;
      transform: translateY(15px);
      animation: splashTextIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
      margin-bottom: 8px;
      position: relative;
      overflow: hidden;
    }

    .splash-brand span {
      color: #3B82F6;
    }

    /* Shimmer sweep across brand text */
    .splash-brand::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255, 255, 255, 0.12) 45%,
        rgba(255, 255, 255, 0.2) 50%,
        rgba(255, 255, 255, 0.12) 55%,
        transparent 100%
      );
      animation: splashShimmer 1.2s ease 0.9s forwards;
    }

    @keyframes splashShimmer {
      to { left: 100%; }
    }

    @keyframes splashTextIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Tagline */
    .splash-tagline {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      color: #6B7280;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      opacity: 0;
      transform: translateY(10px);
      animation: splashTextIn 0.5s ease 0.6s forwards;
      margin-bottom: 32px;
    }

    /* Progress bar */
    .splash-progress-wrap {
      width: 280px;
      height: 4px;
      background: rgba(31, 42, 58, 0.8);
      border-radius: 4px;
      overflow: hidden;
      opacity: 0;
      animation: splashTextIn 0.3s ease 0.8s forwards;
      margin-bottom: 16px;
      position: relative;
    }

    .splash-progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 4px;
      background: linear-gradient(90deg, #3B82F6 0%, #6366F1 50%, #8B5CF6 100%);
      animation: splashFill 1.7s cubic-bezier(0.4, 0, 0.2, 1) 0.8s forwards;
      position: relative;
    }

    /* Glowing edge on progress bar */
    .splash-progress-fill::after {
      content: '';
      position: absolute;
      right: 0;
      top: -3px;
      width: 12px;
      height: 10px;
      border-radius: 50%;
      background: rgba(99, 102, 241, 0.6);
      filter: blur(4px);
    }

    @keyframes splashFill {
      0%   { width: 0%; }
      20%  { width: 25%; }
      50%  { width: 55%; }
      75%  { width: 78%; }
      90%  { width: 92%; }
      100% { width: 100%; }
    }

    /* Status text */
    .splash-status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #4B5563;
      opacity: 0;
      animation: splashTextIn 0.3s ease 1s forwards;
      min-height: 18px;
      transition: opacity 0.15s ease;
    }

    .splash-status.switching {
      opacity: 0.3;
    }

    /* Version badge */
    .splash-version {
      position: absolute;
      bottom: 32px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: #374151;
      letter-spacing: 0.06em;
      opacity: 0;
      animation: splashTextIn 0.4s ease 1.2s forwards;
    }

    /* ── Responsive splash ── */
    @media (max-width: 768px) {
      .splash-logo { height: 100px; }
      .splash-brand { font-size: 28px; }
      .splash-progress-wrap { width: 240px; }
      .splash-glow { width: 260px; height: 260px; }
    }

    @media (max-width: 480px) {
      .splash-logo { height: 80px; }
      .splash-brand { font-size: 24px; }
      .splash-tagline { font-size: 10px; letter-spacing: 0.1em; }
      .splash-progress-wrap { width: 200px; }
      .splash-glow { width: 200px; height: 200px; }
    }

    /* ── Accessibility: reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      .splash-overlay,
      .splash-overlay * {
        animation-duration: 0.01ms !important;
        animation-delay: 0ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════
     SPLASH SCREEN OVERLAY
     Always dark mode, 3s duration, once per session
     ═══════════════════════════════════════════════════════ -->
<div id="splashOverlay" class="splash-overlay" role="presentation" aria-hidden="true">
  <div class="splash-grid"></div>
  <div class="splash-glow"></div>

  <!-- Floating particles -->
  <div class="splash-particles">
    <div class="splash-particle"></div>
    <div class="splash-particle"></div>
    <div class="splash-particle"></div>
    <div class="splash-particle"></div>
    <div class="splash-particle"></div>
    <div class="splash-particle"></div>
    <div class="splash-particle"></div>
    <div class="splash-particle"></div>
  </div>

  <div class="splash-content">
    <img src="/images/BatchHost-Pro_logo.png" alt="BatchHost-Pro" class="splash-logo">
    <div class="splash-brand">BatchHost<span>Pro</span></div>
    <div class="splash-tagline">Batch File Management System</div>
    <div class="splash-progress-wrap">
      <div class="splash-progress-fill"></div>
    </div>
    <div class="splash-status" aria-live="polite">Initializing system…</div>
  </div>

  <div class="splash-version">v2.0</div>
</div>

<!-- ═══════════════════════════════════════════════════════
     LOGIN PAGE (renders behind splash)
     ═══════════════════════════════════════════════════════ -->
<div class="bg-grid"></div>
<div class="glow"></div>
<div class="flash" id="flashContainer"></div>

<div class="card">
  <div class="logo">
    <img src="/images/BatchHost-Pro_logo.png" alt="BatchHost-Pro" style="height: 48px; width: auto;">
    <span class="logo-text">BatchHost<span>Pro</span></span>
  </div>
  <h2>Welcome back</h2>
  <p class="sub">Sign in to your monitoring dashboard</p>

  <div class="form-row">
    <label>Email</label>
    <input type="email" id="email" placeholder="Enter email" autocomplete="email">
  </div>
  <div class="form-row">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password"
           onkeydown="if(event.key==='Enter') doLogin()">
  </div>
  <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>
  <div class="sso-divider" style="display: flex; align-items: center; text-align: center; margin: 20px 0; color: var(--text3); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em;">
    <span style="flex: 1; border-bottom: 1px solid var(--border);"></span>
    <span style="padding: 0 10px;">Or SSO Login</span>
    <span style="flex: 1; border-bottom: 1px solid var(--border);"></span>
  </div>
  <button class="btn" id="ssoBtn" onclick="window.location.href='https://172.100.31.40:8000'" style="background: rgba(59,130,246,0.12); color: var(--accent); border: 1px solid rgba(59,130,246,0.3); margin-top: 0; display: flex; align-items: center; justify-content: center; gap: 8px;">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shield" style="flex-shrink:0;"><path d="M20 13c0 5-3.5 7.5-7.66 9.7a1 1 0 0 1-.68 0C7.5 20.5 4 18 4 13V6a1 1 0 0 1 .76-.97l8-2a1 1 0 0 1 .48 0l8 2A1 1 0 0 1 20 6z"/></svg>
    Use Central Auth Portal
  </button>
  <div class="switch-link">If you don't have an account, contact super admin for account creation.</div>
</div>

<script>
  // ── Flash messages ──
  function flash(msg,type='error'){
    const c=document.getElementById('flashContainer');
    const el=document.createElement('div'); el.className=`flash-msg ${type}`;
    const icons={success:'OK',error:'ERR',info:'INFO'};
    el.innerHTML=`<span>${icons[type]}</span> ${msg}`; c.appendChild(el);
    setTimeout(()=>el.remove(),3100); 
  }

  // ── Login ──
  async function doLogin(){
    const btn=document.getElementById('loginBtn');
    const email=document.getElementById('email').value.trim();
    const password=document.getElementById('password').value;
    if(!email||!password){ flash('Please fill in all fields'); return; }
    btn.disabled=true; btn.textContent='Signing in…';
    try {
      const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
      const d=await r.json();
      if(d.success){ flash('Login successful!','success'); setTimeout(()=>window.location.href=d.redirect || '/dashboard',600); }
      else { flash(d.message||'Invalid credentials'); btn.disabled=false; btn.textContent='Sign In'; }
    } catch(e){ flash('Connection error'); btn.disabled=false; btn.textContent='Sign In'; }
  }

  // ══════════════════════════════════════════════════════════════
  // SPLASH SCREEN LOGIC
  // Shows once per browser session, always dark, 3 second duration
  // ══════════════════════════════════════════════════════════════
  (function initSplash() {
    const overlay = document.getElementById('splashOverlay');
    if (!overlay) return;

    // Only show once per session
    if (sessionStorage.getItem('bhp_splash_shown')) {
      overlay.remove();
      return;
    }

    sessionStorage.setItem('bhp_splash_shown', 'true');

    // Cycle status messages
    const statusEl = overlay.querySelector('.splash-status');
    const messages = [
      'Initializing system…',
      'Loading modules…',
      'Verifying configuration…',
      'Preparing dashboard…'
    ];
    let msgIndex = 0;

    const cycleMessage = () => {
      if (!statusEl) return;
      statusEl.classList.add('switching');
      setTimeout(() => {
        msgIndex = (msgIndex + 1) % messages.length;
        statusEl.textContent = messages[msgIndex];
        statusEl.classList.remove('switching');
      }, 150);
    };

    const msgInterval = setInterval(cycleMessage, 650);

    // Fade out after 2.5s, then remove overlay
    setTimeout(() => {
      clearInterval(msgInterval);
      overlay.classList.add('fade-out');
      setTimeout(() => overlay.remove(), 500);
    }, 2500);
  })();
</script>
</body>
</html>
